apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: webby
  namespace: webby
  annotations:
    # OAuth2 proxy — adjust URLs to match your cluster's OAuth setup
    nginx.ingress.kubernetes.io/auth-url: "https://oauth2.example.com/oauth2/auth"
    nginx.ingress.kubernetes.io/auth-signin: "https://oauth2.example.com/oauth2/start?rd=$escaped_request_uri"
spec:
  ingressClassName: nginx
  rules:
    - host: webby.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: webby
                port:
                  number: 80
  tls:
    - hosts:
        - webby.example.com
      secretName: webby-tls
